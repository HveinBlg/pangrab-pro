<!DOCTYPE html>
<html lang="en" data-i18n-doctitle="opt_title">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="options.css" />
  <title>PanGrab · Saved Links</title>
</head>
<body>
  <header class="top">
    <div class="title">
      <h1 data-i18n="opt_title">PanGrab · Saved Links</h1>
    </div>
    <div class="actions">
      <input type="file" id="importFile" accept="application/json" hidden />
      <button id="followBtn" class="ghost" data-i18n="opt_follow" hidden>📢 Follow</button>
      <button id="codeLibrary" class="ghost" data-i18n="opt_code_library">📁 Code Library</button>
      <button id="newCategory" class="ghost" data-i18n="opt_new_category">+ New category</button>
      <button id="importBtn" class="ghost" data-i18n="opt_import">Import</button>
      <button id="exportJson" class="ghost" data-i18n="opt_export_json">Export JSON</button>
      <button id="exportCsv" class="ghost" data-i18n="opt_export_csv">Export CSV</button>
      <button id="exportTxt" class="ghost" data-i18n="opt_export_txt">Export TXT</button>
      <button id="checkLive" class="ghost" data-i18n="opt_check_live">Check links</button>
      <button id="cleanInvalid" class="ghost" data-i18n="opt_clean_invalid">Clean invalid</button>
      <button id="clearAll" class="danger" data-i18n="opt_clear_all">Clear all</button>
    </div>
  </header>

  <section class="stats" id="stats"></section>

  <section class="controls">
    <input type="search" id="search" data-i18n-ph="opt_search_placeholder" placeholder="Search links, notes, titles, codes…" />
    <div id="filterProvider" class="dd" data-role="filterProvider"></div>
    <div id="filterCategory" class="dd" data-role="filterCategory"></div>
    <div id="sortBy" class="dd" data-role="sortBy"></div>
  </section>

  <section id="batchBar" class="batch-bar">
    <label class="batch-all"><input type="checkbox" id="batchSelectAll" /> <span data-i18n="opt_batch_select_all">Select all shown</span></label>
    <span id="batchCount" class="batch-count" data-i18n="opt_batch_none">None selected</span>
    <span class="batch-actions" id="batchActions" hidden>
      <div id="batchCategory" class="dd" data-role="batch" data-i18n-title="opt_batch_category_title" title="Move to category…"></div>
      <button id="batchApply" class="ghost" data-i18n="opt_batch_apply">Apply category</button>
      <button id="batchDelete" class="danger" data-i18n="opt_batch_delete">Delete selected</button>
      <button id="batchClear" class="ghost" data-i18n="opt_batch_clear">Clear selection</button>
    </span>
  </section>

  <main id="grid" class="grid"></main>

  <div id="emptyState" class="empty-state" hidden>
    <p data-i18n="opt_empty">No saved netdisk links yet.</p>
    <p class="hint" data-i18n="opt_empty_hint">While browsing, click the extension icon, or right-click “Save this netdisk link” to add.</p>
  </div>

  <!-- 编辑弹层 -->
  <div id="editModal" class="modal" hidden>
    <div class="modal-card">
      <button type="button" id="editClose" class="modal-close" data-i18n-label="opt_close" aria-label="Close">✕</button>
      <h3 data-i18n="opt_edit_title">Edit link</h3>
      <label><span data-i18n="opt_field_title">Title / resource name</span>
        <input type="text" id="editTitle" autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other" data-i18n-ph="opt_field_title_ph" placeholder="Give this resource a name" />
      </label>
      <label><span data-i18n="opt_field_category">Category</span>
        <input type="text" id="editCategory" list="categoryList" autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other" data-i18n-ph="opt_field_category_ph" placeholder="e.g. Movies / Study / Software" />
        <datalist id="categoryList"></datalist>
      </label>
      <label><span data-i18n="opt_field_tags">Tags (comma separated)</span>
        <input type="text" id="editTags" autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other" data-i18n-ph="opt_field_tags_ph" placeholder="e.g. HD, collection" />
      </label>
      <label><span data-i18n="opt_field_code">Extraction code</span>
        <input type="text" id="editCode" autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other" data-i18n-ph="opt_field_code_ph" placeholder="Extraction code / access password" />
      </label>
      <label><span data-i18n="opt_field_note">Note</span>
        <textarea id="editNote" rows="3" data-i18n-ph="opt_field_note_ph" placeholder="Note"></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" id="editCancel" class="ghost" data-i18n="opt_cancel">Cancel</button>
        <button type="button" id="editSave" class="primary" data-i18n="opt_save">Save</button>
      </div>
    </div>
  </div>

  <!-- 通用对话框（替代浏览器原生 prompt / confirm） -->
  <div id="dialog" class="modal" hidden>
    <div class="modal-card dialog-card">
      <h3 id="dialogTitle"></h3>
      <p id="dialogMessage" class="dialog-message" hidden></p>
      <input type="text" id="dialogInput" autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other" hidden />
      <div class="modal-actions">
        <button type="button" id="dialogCancel" class="ghost" data-i18n="opt_cancel">Cancel</button>
        <button type="button" id="dialogOk" class="primary" data-i18n="opt_ok">OK</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 更多资源 · 关注频道 -->
  <div id="followModal" class="modal" hidden>
    <div class="modal-card">
      <button type="button" id="followClose" class="modal-close" data-i18n-label="opt_close" aria-label="Close">✕</button>
      <h3 data-i18n="opt_more_resources">More resources</h3>
      <div id="followBody" class="follow-body"></div>
    </div>
  </div>

  <script src="../i18n.js"></script>
  <script src="../detector.js"></script>
  <script src="../promos.js"></script>
  <script src="../pro-config.js"></script>
  <script src="../pro-state.js"></script>
  <script src="../api.js"></script>
  <script src="options.js"></script>
  <script src="pro.js"></script>
</body>
</html>
