<!DOCTYPE html>
<html lang="en" data-i18n-doctitle="actionTitle">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>PanGrab</title>
</head>
<body>
  <header class="pop-header">
    <div class="brand">
      <span class="brand-name" data-i18n="popup_brand">PanGrab</span>
    </div>
    <div class="header-btns">
      <button id="followBtn" class="link-btn" data-i18n="popup_follow" data-i18n-title="popup_follow_title" hidden>📢 Channel</button>
      <button id="openManager" class="link-btn" data-i18n="popup_manage" data-i18n-title="popup_manage_title">Manage ▸</button>
    </div>
  </header>

  <div class="toolbar">
    <span id="summary" class="summary" data-i18n="popup_scanning">Scanning current page…</span>
    <div class="toolbar-btns">
      <button id="rescan" class="ghost-btn" data-i18n="popup_rescan" data-i18n-title="popup_rescan_title">↻ Rescan</button>
      <button id="resetScan" class="ghost-btn" data-i18n="popup_reset" data-i18n-title="popup_reset_title">Clear scan</button>
    </div>
  </div>

  <div id="banner" class="banner" hidden></div>

  <main id="list" class="list">
    <!-- 链接卡片动态渲染 -->
  </main>

  <footer class="pop-footer">
    <label class="select-all">
      <input type="checkbox" id="selectAll" /> <span data-i18n="popup_select_all">Select all</span>
    </label>
    <button id="saveSelected" class="primary-btn" disabled>Save selected (0)</button>
  </footer>

  <div id="recommend" class="recommend" hidden>
    <span id="recLabel" class="rec-label"></span>
    <a id="recLink" class="rec-link" target="_blank" rel="noreferrer"></a>
    <button id="recRefresh" class="rec-refresh" data-i18n-title="popup_rec_refresh_title">⟳</button>
  </div>

  <div id="promo" class="promo" hidden>
    <span class="promo-tag" data-i18n="popup_promo_tag">Ad</span>
    <a id="promoLink" class="promo-link" target="_blank" rel="noreferrer"></a>
    <button id="promoClose" class="promo-close" data-i18n-title="popup_promo_close_title">✕</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../i18n.js"></script>
  <script src="../detector.js"></script>
  <script src="../promos.js"></script>
  <script src="popup.js"></script>
</body>
</html>
