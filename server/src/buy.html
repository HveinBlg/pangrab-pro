<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>开通 PanGrab Pro</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", sans-serif;
    background: #f4f6fb; color: #1f2733; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(20,40,80,.08);
    width: 100%; max-width: 460px; padding: 28px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #7a869a; font-size: 13px; margin-bottom: 18px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab {
    flex: 1; text-align: center; padding: 9px 0; border: 1.5px solid #e6eaf2; border-radius: 10px;
    cursor: pointer; font-size: 13px; font-weight: 600; color: #5a6678; background: #fff; transition: .15s;
  }
  .tab.active { border-color: #3d7fff; color: #3d7fff; background: #f3f8ff; }
  .plans { display: flex; flex-direction: column; gap: 12px; }
  .plan {
    border: 2px solid #e6eaf2; border-radius: 12px; padding: 14px 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; transition: .15s;
  }
  .plan:hover { border-color: #b9cdfb; }
  .plan.active { border-color: #3d7fff; background: #f3f8ff; }
  .plan .name { font-weight: 600; font-size: 15px; }
  .plan .desc { color: #7a869a; font-size: 12px; margin-top: 2px; }
  .plan .price { font-size: 20px; font-weight: 700; color: #3d7fff; white-space: nowrap; }
  .plan .price small { font-size: 12px; font-weight: 500; color: #7a869a; }
  .btn {
    width: 100%; margin-top: 22px; padding: 13px; border: none; border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; background: #1677ff;
  }
  .btn.intl { background: #ffc233; color: #2b2b2b; }
  .btn:disabled { background: #c7cfdb; color: #fff; cursor: not-allowed; }
  .msg { font-size: 13px; margin-top: 14px; min-height: 18px; text-align: center; }
  .msg.err { color: #cf1322; }
  .msg.ok { color: #15a05b; }
  .foot { margin-top: 18px; font-size: 12px; color: #9aa4b5; text-align: center; line-height: 1.7; }
  .hide { display: none !important; }
  /* 扫码视图 */
  .qr-wrap { text-align: center; }
  .qr-amount { font-size: 26px; font-weight: 700; color: #1f2733; margin: 4px 0 2px; }
  .qr-sub { color: #7a869a; font-size: 13px; margin-bottom: 14px; }
  .qr-box { display: inline-block; padding: 12px; border: 1px solid #eef1f6; border-radius: 14px; background: #fff; }
  .qr-box img { display: block; width: 240px; height: 240px; }
  .qr-tip { margin-top: 12px; font-size: 14px; color: #1677ff; font-weight: 600; }
  .qr-status { margin-top: 10px; font-size: 13px; color: #7a869a; min-height: 18px; }
  .qr-status.paid { color: #15a05b; font-weight: 600; }
  .link { display: inline-block; margin-top: 16px; color: #7a869a; font-size: 13px; cursor: pointer; text-decoration: underline; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #cdd6e4; border-top-color:#1677ff;
    border-radius:50%; animation: spin .8s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <!-- 选择视图 -->
    <div id="selectView">
      <h1>开通 PanGrab Pro</h1>
      <div class="sub">选择套餐与支付方式，到账后自动开通会员。</div>

      <div class="tabs" id="tabs">
        <div class="tab" data-prov="alipay" id="tabAlipay">支付宝</div>
        <div class="tab" data-prov="lemonsqueezy" id="tabIntl">International</div>
      </div>

      <div class="plans" id="plans">
        <div class="plan active" data-plan="month">
          <div><div class="name">月卡 / Monthly</div><div class="desc">30 天 · 云同步无限制</div></div>
          <div class="price" data-p="month"></div>
        </div>
        <div class="plan" data-plan="quarter">
          <div><div class="name">季卡 / Quarterly</div><div class="desc">90 天 · 更划算</div></div>
          <div class="price" data-p="quarter"></div>
        </div>
        <div class="plan" data-plan="year">
          <div><div class="name">年卡 / Yearly</div><div class="desc">365 天 · 最超值</div></div>
          <div class="price" data-p="year"></div>
        </div>
      </div>

      <button class="btn" id="payBtn">支付</button>
      <div class="msg" id="msg"></div>
      <div class="foot">
        支付遇到问题？可在扩展中使用兑换码激活。<br/>
        支付完成后请返回扩展「账号 / 云同步」面板刷新。
      </div>
    </div>

    <!-- 扫码视图 -->
    <div id="qrView" class="qr-wrap hide">
      <h1>支付宝扫码支付</h1>
      <div class="qr-amount" id="qrAmount"></div>
      <div class="qr-sub" id="qrSubject"></div>
      <div class="qr-box"><img id="qrImg" alt="支付二维码" /></div>
      <div class="qr-tip">请用手机支付宝「扫一扫」支付</div>
      <div class="qr-status" id="qrStatus"><span class="spinner"></span>等待支付中…</div>
      <span class="link" id="qrBack">‹ 返回重新选择</span>
    </div>
  </div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var token = params.get("token") || "";
  var selectedPlan = "month";
  var provider = "alipay";
  var providers = { alipay: false, lemonsqueezy: false };
  var plans = null;
  var pollTimer = null;

  var el = function (id) { return document.getElementById(id); };
  var plansEl = el("plans"), btn = el("payBtn"), msgEl = el("msg");
  var tabAlipay = el("tabAlipay"), tabIntl = el("tabIntl");
  var selectView = el("selectView"), qrView = el("qrView");

  function msg(t, ok) { msgEl.textContent = t || ""; msgEl.className = "msg " + (ok ? "ok" : "err"); }
  // 是否中国大陆用户：优先看时区（台湾/香港/澳门及海外都不算），回退到简体中文语言。
  // 大陆用户默认支付宝(CNY)，其余地区默认国际支付(Lemon Squeezy，按当地货币结算)。
  function isMainlandChina() {
    try {
      var tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || "").toLowerCase();
      if (tz.indexOf("taipei") !== -1 || tz.indexOf("hong_kong") !== -1 || tz.indexOf("macau") !== -1) return false;
      var cnZones = ["shanghai", "urumqi", "chongqing", "harbin", "kashgar"];
      for (var i = 0; i < cnZones.length; i++) { if (tz.indexOf(cnZones[i]) !== -1) return true; }
    } catch (e) { /* 时区不可用则回退到语言判断 */ }
    var lang = (navigator.language || "").toLowerCase();
    return lang === "zh-cn" || lang.indexOf("zh-hans") === 0;
  }

  function renderPrices() {
    ["month", "quarter", "year"].forEach(function (k) {
      var node = plansEl.querySelector('[data-p="' + k + '"]');
      if (!node) return;
      if (provider === "alipay" && plans && plans[k]) {
        var unit = k === "month" ? "/月" : k === "quarter" ? "/季" : "/年";
        node.innerHTML = "\u00a5" + plans[k].amount + '<small>' + unit + '</small>';
      } else {
        node.innerHTML = '<small>本地货币结算<br/>local currency</small>';
      }
    });
  }

  function setProvider(p) {
    provider = p;
    tabAlipay.classList.toggle("active", p === "alipay");
    tabIntl.classList.toggle("active", p === "lemonsqueezy");
    if (p === "alipay") { btn.className = "btn"; btn.textContent = "使用支付宝支付"; }
    else { btn.className = "btn intl"; btn.textContent = "Pay (International)"; }
    renderPrices();
  }

  function applyProviders() {
    tabAlipay.classList.toggle("hide", !providers.alipay);
    tabIntl.classList.toggle("hide", !providers.lemonsqueezy);
    var available = [];
    if (providers.alipay) available.push("alipay");
    if (providers.lemonsqueezy) available.push("lemonsqueezy");
    if (available.length === 0) { el("tabs").classList.add("hide"); btn.disabled = true;
      msg("当前未开通在线支付，请在扩展中使用兑换码激活，或联系客服。"); return; }
    if (available.length === 1) el("tabs").classList.add("hide");
    var prefer = isMainlandChina() ? "alipay" : "lemonsqueezy";
    if (available.indexOf(prefer) === -1) prefer = available[0];
    setProvider(prefer);
  }

  plansEl.addEventListener("click", function (e) {
    var p = e.target.closest(".plan");
    if (!p) return;
    Array.prototype.forEach.call(plansEl.querySelectorAll(".plan"), function (x) { x.classList.remove("active"); });
    p.classList.add("active");
    selectedPlan = p.getAttribute("data-plan");
  });

  tabAlipay.addEventListener("click", function () { if (providers.alipay) setProvider("alipay"); });
  tabIntl.addEventListener("click", function () { if (providers.lemonsqueezy) setProvider("lemonsqueezy"); });

  // 显示扫码视图并开始轮询
  function showQr(data) {
    selectView.classList.add("hide");
    qrView.classList.remove("hide");
    el("qrImg").src = data.qrDataUrl;
    el("qrAmount").textContent = "\u00a5" + (data.amount || "");
    el("qrSubject").textContent = data.subject || "";
    el("qrStatus").className = "qr-status";
    el("qrStatus").innerHTML = '<span class="spinner"></span>等待支付中…';
    startPolling(data.out_trade_no);
  }

  function backToSelect() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    qrView.classList.add("hide");
    selectView.classList.remove("hide");
    btn.disabled = false; msg("");
  }
  el("qrBack").addEventListener("click", backToSelect);

  function startPolling(outTradeNo) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async function () {
      try {
        var r = await fetch("/api/order/status?out_trade_no=" + encodeURIComponent(outTradeNo), {
          headers: { "Authorization": "Bearer " + token }
        });
        var d = await r.json();
        if (d.ok && d.order && d.order.status === "paid") {
          clearInterval(pollTimer); pollTimer = null;
          var s = el("qrStatus"); s.className = "qr-status paid";
          s.textContent = "✓ 支付成功！会员已开通，请回扩展刷新。";
        }
      } catch (e) { /* 轮询失败忽略，下次再试 */ }
    }, 3000);
  }

  btn.addEventListener("click", async function () {
    if (!token) return;
    btn.disabled = true; msg("正在创建订单… / Creating order…", true);
    try {
      var r = await fetch("/api/order/create", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ plan: selectedPlan, provider: provider })
      });
      var data = await r.json();
      if (!r.ok) throw new Error(data.error || "下单失败");
      if (data.mode === "qr") { showQr(data); return; }       // 支付宝当面付：显示二维码
      if (data.payUrl) { msg("正在跳转支付… / Redirecting…", true); location.href = data.payUrl; return; }
      throw new Error("下单返回异常");
    } catch (e) {
      msg(e.message || "下单失败"); btn.disabled = false;
    }
  });

  (async function init() {
    if (!token) { msg("缺少登录凭证，请从扩展内的「购买会员」按钮进入本页。"); btn.disabled = true; }
    try {
      var r = await fetch("/api/pay/providers");
      var d = await r.json();
      providers = d.providers || providers;
      plans = d.plans || null;
    } catch (e) {}
    applyProviders();
    renderPrices();
  })();
})();
</script>
</body>
</html>
